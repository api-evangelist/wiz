aid: wiz
name: Wiz
description: >-
  Wiz is a cloud-native application protection platform (CNAPP) that
  provides agentless security across AWS, Azure, GCP, Kubernetes, and
  containers, covering CSPM, CWPP, CIEM, vulnerability management,
  DSPM, and threat detection in a unified security graph. The Wiz
  GraphQL API exposes inventory, issues, vulnerabilities, configurations,
  and reporting using OAuth 2.0 client credentials authentication.
type: Index
